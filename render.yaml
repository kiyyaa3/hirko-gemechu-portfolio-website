services:
  - type: web
    name: hirko-portfolio-mern
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm --prefix client run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.11.0"
      - key: SERVE_CLIENT
        value: "true"
      - key: RATE_LIMIT_MAX
        value: "1000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_URL
        value: https://hirko-gemechu-portfolio-website.onrender.com,https://hirko-gemechu-birdida.netlify.app,https://kiyyaa3.github.io/hirko-gemechu-portfolio-website
      - key: MONGO_TIMEOUT_MS
        value: "10000"
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3.1
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
