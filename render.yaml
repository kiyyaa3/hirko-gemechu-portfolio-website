services:
  - type: web
    name: hirko-portfolio-mern
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: "true"
      - key: RATE_LIMIT_MAX
        value: "1000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_URL
        value: https://kiyyaa3.github.io/hirko-gemechu-portfolio-website,https://hirko-gemechu-portfolio-website.onrender.com
      - key: MONGO_TIMEOUT_MS
        value: "10000"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
